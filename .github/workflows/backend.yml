name: Backend — Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'database/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

env:
  NODE_VERSION: '20'
  IMAGE_NAME: bluemetal-api
  CONTAINER_APP_NAME: bluemetal-prod-api
  RESOURCE_GROUP: bluemetal-prod-rg

jobs:
  # ─────────────────────────────────────────
  # 1. Lint + Build TypeScript
  # ─────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.4.0

      - uses: actions/setup-node@v4.5.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json  # root workspace lock

      - name: Install backend + shared dependencies
        # --ignore-scripts skips react-native native build steps in mobile workspace
        run: npm ci --ignore-scripts --workspace=backend --workspace=packages/shared --include-workspace-root

      - name: Type-check
        working-directory: backend
        run: npx tsc --noEmit

      - name: Build
        working-directory: backend
        run: npm run build

      - name: Prepare deploy artifact
        # Copy root workspace lockfile (has all transitive deps) into backend/
        # so the Docker job can run `npm ci` in a self-contained folder.
        run: cp package-lock.json backend/package-lock.json

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: |
            backend/dist
            backend/package.json
            backend/package-lock.json
            backend/Dockerfile
          retention-days: 1

  # ─────────────────────────────────────────
  # 2. Build Docker image and push to ACR
  # ─────────────────────────────────────────
  docker:
    name: Docker → ACR
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: backend-dist
          path: deploy

      - name: Set image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: deploy
          file: deploy/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

  # ─────────────────────────────────────────
  # 3. Run DB migrations
  # ─────────────────────────────────────────
  migrate:
    name: Database Migration
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4.4.0

      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Allow runner IP in Postgres firewall
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Upgrade az CLI
        run: |
          az version
          pip install --upgrade azure-cli 2>/dev/null || true
          az version

      - name: Add runner IP to firewall
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          PG_SERVER="bluemetal-prod-postgres"
          RG="${{ env.RESOURCE_GROUP }}"
          az postgres flexible-server firewall-rule create \
            -g "$RG" -s "$PG_SERVER" \
            -n AllowGitHubRunner \
            --start-ip-address "$RUNNER_IP" \
            --end-ip-address "$RUNNER_IP"

      - name: Enable required extensions
        run: |
          az postgres flexible-server parameter set \
            -g "${{ env.RESOURCE_GROUP }}" \
            -s bluemetal-prod-postgres \
            -n azure.extensions \
            --value uuid-ossp,pgcrypto

      - name: Run migrations
        env:
          PGPASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          CONN="host=bluemetal-prod-postgres.postgres.database.azure.com port=5432 dbname=stonecrusherdb user=${{ secrets.DB_USER }} sslmode=require"
          psql "$CONN" -f database/migrations/001_initial.sql --set ON_ERROR_STOP=1 -q
          psql "$CONN" -f database/migrations/002_weighbridge_cameras.sql --set ON_ERROR_STOP=1 -q
          psql "$CONN" -f database/migrations/003_test_accounts.sql --set ON_ERROR_STOP=1 -q
          psql "$CONN" -f database/migrations/004_crushers.sql --set ON_ERROR_STOP=1 -q
          psql "$CONN" -f database/migrations/005_seed_crusher_access.sql --set ON_ERROR_STOP=1 -q
          psql "$CONN" -f database/migrations/006_notifications_v2.sql --set ON_ERROR_STOP=1 -q
          psql "$CONN" -f database/migrations/007_seed_test_data.sql --set ON_ERROR_STOP=1 -q
          psql "$CONN" -f database/migrations/008_platform_admin.sql --set ON_ERROR_STOP=1 -q
          psql "$CONN" -f database/migrations/009_more_test_data.sql --set ON_ERROR_STOP=1 -q
          psql "$CONN" -f database/migrations/010_simplify_roles.sql --set ON_ERROR_STOP=1 -q
          psql "$CONN" -f database/migrations/011_fix_test_passwords.sql --set ON_ERROR_STOP=1 -q
          psql "$CONN" -f database/migrations/012_cleanup_duplicate_crushers.sql --set ON_ERROR_STOP=1 -q
          psql "$CONN" -f database/migrations/013_notify_events_extended.sql --set ON_ERROR_STOP=1 -q
          psql "$CONN" -f database/migrations/014_add_tenants.sql --set ON_ERROR_STOP=1 -q
          psql "$CONN" -f database/migrations/015_platform_admin_flag.sql --set ON_ERROR_STOP=1 -q
          psql "$CONN" -f database/migrations/015_weighbridge_counter_per_crusher.sql --set ON_ERROR_STOP=1 -q
          psql "$CONN" -f database/migrations/016_cascade_delete_tenant.sql --set ON_ERROR_STOP=1 -q
          psql "$CONN" -f database/migrations/017_quarry_purchases.sql --set ON_ERROR_STOP=1 -q
          psql "$CONN" -f database/migrations/018_fix_report_viewer_password.sql --set ON_ERROR_STOP=1 -q
          psql "$CONN" -f database/migrations/019_realistic_seed_data.sql --set ON_ERROR_STOP=1 -q
          psql "$CONN" -f database/migrations/020_fix_user_access.sql --set ON_ERROR_STOP=1 -q
          psql "$CONN" -f database/migrations/021_weighbridge_crusher_id.sql --set ON_ERROR_STOP=1 -q

      - name: Remove runner IP from firewall
        if: always()
        run: |
          az postgres flexible-server firewall-rule delete \
            -g "${{ env.RESOURCE_GROUP }}" \
            -s bluemetal-prod-postgres \
            -n AllowGitHubRunner --yes || true

  # ─────────────────────────────────────────
  # 4. Deploy to Azure Container Apps
  # ─────────────────────────────────────────
  deploy:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: [docker, migrate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://api.bluemetalpro.in

    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy new revision to Container App
        run: |
          az containerapp update \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ needs.docker.outputs.image_tag }}

      - name: Smoke test
        run: |
          sleep 20
          curl -f https://api.bluemetalpro.in/health || \
          curl -f https://api.bluemetalpro.in/ || true
