name: Backend — Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'database/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

env:
  NODE_VERSION: '20'
  IMAGE_NAME: bluemetal-api
  CONTAINER_APP_NAME: bluemetal-prod-api
  RESOURCE_GROUP: bluemetal-prod-rg

jobs:
  # ─────────────────────────────────────────
  # 1. Lint + Build TypeScript
  # ─────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: ./node_modules/.bin/tsc --noEmit

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: |
            backend/dist
            backend/package.json
            backend/package-lock.json
            backend/Dockerfile
          retention-days: 1

  # ─────────────────────────────────────────
  # 2. Build Docker image and push to ACR
  # ─────────────────────────────────────────
  docker:
    name: Docker → ACR
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: backend-dist
          path: deploy

      - name: Restore production dependencies
        working-directory: deploy
        run: npm ci --omit=dev

      - name: Set image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: deploy
          file: deploy/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

  # ─────────────────────────────────────────
  # 3. Run DB migrations
  # ─────────────────────────────────────────
  migrate:
    name: Database Migration
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Allow runner IP in Postgres firewall
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Add runner IP to firewall
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          az postgres flexible-server firewall-rule create \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --server-name bluemetal-prod-postgres \
            --name AllowGitHubRunner \
            --start-ip-address "$RUNNER_IP" \
            --end-ip-address "$RUNNER_IP"

      - name: Enable required extensions
        run: |
          az postgres flexible-server parameter set \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --server-name bluemetal-prod-postgres \
            --name azure.extensions \
            --value uuid-ossp,pgcrypto

      - name: Run migrations
        env:
          PGPASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          CONN="host=bluemetal-prod-postgres.postgres.database.azure.com port=5432 dbname=stonecrusherdb user=${{ secrets.DB_USER }} sslmode=require"
          psql "$CONN" -f database/migrations/001_initial.sql --set ON_ERROR_STOP=1 -q
          psql "$CONN" -f database/migrations/002_weighbridge_cameras.sql --set ON_ERROR_STOP=1 -q

      - name: Remove runner IP from firewall
        if: always()
        run: |
          az postgres flexible-server firewall-rule delete \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --server-name bluemetal-prod-postgres \
            --name AllowGitHubRunner --yes || true

  # ─────────────────────────────────────────
  # 4. Deploy to Azure Container Apps
  # ─────────────────────────────────────────
  deploy:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: [docker, migrate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://bluemetal-prod-api.redflower-fa4e0eb0.eastus2.azurecontainerapps.io

    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy new revision to Container App
        run: |
          az containerapp update \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ needs.docker.outputs.image_tag }}

      - name: Smoke test
        run: |
          sleep 20
          curl -f https://bluemetal-prod-api.redflower-fa4e0eb0.eastus2.azurecontainerapps.io/health || \
          curl -f https://bluemetal-prod-api.redflower-fa4e0eb0.eastus2.azurecontainerapps.io/ || true
