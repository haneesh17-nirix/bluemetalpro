name: Backend — Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'database/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

env:
  NODE_VERSION: '20'
  AZURE_WEBAPP_NAME: bluemetal-prod-api   # matches Bicep output

jobs:
  # ─────────────────────────────────────────
  # 1. Lint + Build
  # ─────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: |
            backend/dist
            backend/package.json
            backend/package-lock.json
          retention-days: 1

  # ─────────────────────────────────────────
  # 2. Migrate DB (main branch only)
  # ─────────────────────────────────────────
  migrate:
    name: Database Migration
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install psql client
        run: sudo apt-get install -y postgresql-client

      - name: Run migrations
        env:
          PGPASSWORD: ${{ secrets.DB_PASSWORD }}
          CONN: "postgresql://${{ secrets.DB_USER }}@${{ secrets.DB_HOST }}/stonecrusherdb?sslmode=require"
        run: |
          psql "$CONN" -f database/migrations/001_initial.sql --set ON_ERROR_STOP=1
          psql "$CONN" -f database/migrations/002_weighbridge_cameras.sql --set ON_ERROR_STOP=1

  # ─────────────────────────────────────────
  # 3. Deploy to Azure App Service
  # ─────────────────────────────────────────
  deploy:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: [build, migrate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: backend-dist
          path: deploy

      - name: Restore production dependencies
        working-directory: deploy
        run: npm ci --only=production

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: deploy

      - name: Smoke test
        run: |
          sleep 15
          curl -f https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/health || exit 1
