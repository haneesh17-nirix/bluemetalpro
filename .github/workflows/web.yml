name: Web Dashboard — Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - '.github/workflows/web.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/web/**'
  workflow_dispatch:   # allow manual trigger from GitHub UI

env:
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────
  # 1. Build Next.js static export
  # ─────────────────────────────────────────
  build:
    name: Build Next.js
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: ./node_modules/.bin/tsc --noEmit

      - name: Build (static export → out/)
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: npm run build
        # next.config.js output:'export' writes to apps/web/out/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-out
          path: apps/web/out
          retention-days: 1

  # ─────────────────────────────────────────
  # 2. Deploy to Azure Static Web Apps (main only)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Azure SWA
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment:
      name: production
      url: https://happy-beach-0dd66180f.7.azurestaticapps.net

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: web-out
          path: apps/web/out

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: apps/web/out      # pre-built static files
          output_location: ''             # already the final output
          skip_app_build: true

  # ─────────────────────────────────────────
  # 3. PR preview deployments
  # ─────────────────────────────────────────
  preview:
    name: PR Preview
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install & build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: npm ci && npm run build

      - name: Deploy PR preview
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: apps/web/out
          output_location: ''
          skip_app_build: true

  # Close PR preview environment
  close_preview:
    name: Close PR Preview
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    steps:
      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
