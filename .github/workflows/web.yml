name: Web Dashboard — Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/shared/**'
      - '.github/workflows/web.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/shared/**'
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────
  # 1. Build Next.js static export
  # ─────────────────────────────────────────
  build:
    name: Build Next.js
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.4.0

      - uses: actions/setup-node@v4.5.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install web + shared dependencies
        # --ignore-scripts avoids react-native native build steps in mobile workspace
        run: npm ci --ignore-scripts --workspace=apps/web --workspace=packages/shared --include-workspace-root

      - name: Type-check web
        working-directory: apps/web
        run: npx tsc --noEmit

      - name: Build (static export → apps/web/out/)
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-out
          path: apps/web/out
          retention-days: 1

  # ─────────────────────────────────────────
  # 2. Deploy to Azure Static Web Apps (main only)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Azure SWA
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment:
      name: production
      url: https://bluemetalpro.in

    steps:
      - uses: actions/checkout@v4.4.0

      - uses: actions/download-artifact@v4
        with:
          name: web-out
          path: apps/web/out

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: apps/web/out
          output_location: ''
          skip_app_build: true

  # ─────────────────────────────────────────
  # 3. PR preview deployments
  # ─────────────────────────────────────────
  preview:
    name: PR Preview
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4.4.0

      - uses: actions/setup-node@v4.5.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install web + shared dependencies
        run: npm ci --ignore-scripts --workspace=apps/web --workspace=packages/shared --include-workspace-root

      - name: Build static export
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: npm run build

      - name: Deploy PR preview
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: apps/web/out
          output_location: ''
          skip_app_build: true

  close_preview:
    name: Close PR Preview
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    steps:
      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
