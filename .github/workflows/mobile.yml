name: Mobile — EAS Build

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - 'packages/shared/**'
      - '.github/workflows/mobile.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - 'packages/shared/**'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options: [all, android, ios]
      profile:
        description: 'EAS build profile'
        required: true
        default: 'preview'
        type: choice
        options: [development, preview, production]

env:
  NODE_VERSION: '22'

jobs:
  # ─────────────────────────────────────────
  # 1. TypeScript check (all triggers)
  # ─────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.3.1

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (mobile + shared only)
        run: npm ci --ignore-scripts --workspace=apps/mobile --workspace=packages/shared --include-workspace-root

      - name: Type-check
        working-directory: apps/mobile
        run: npx tsc --noEmit

  # ─────────────────────────────────────────
  # 2. EAS Build — main push or manual trigger
  # ─────────────────────────────────────────
  build:
    name: EAS Build (${{ inputs.profile || 'preview' }} / ${{ inputs.platform || 'android' }})
    runs-on: ubuntu-latest
    needs: typecheck
    if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4.3.1

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts --workspace=apps/mobile --workspace=packages/shared --include-workspace-root

      - name: Set up Expo + EAS
        uses: expo/expo-github-action@v9
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Write .env
        working-directory: apps/mobile
        run: echo "EXPO_PUBLIC_API_URL=${{ secrets.EXPO_PUBLIC_API_URL }}" > .env

      - name: EAS Build
        working-directory: apps/mobile
        run: |
          eas build \
            --platform "${{ inputs.platform || 'android' }}" \
            --profile "${{ inputs.profile || 'preview' }}" \
            --non-interactive \
            --no-wait
