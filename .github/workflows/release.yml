name: Release — Version Bump & Changelog

# Runs automatically after every merge to main.
# Reads commits since the last tag, determines the semver bump,
# updates all package.json versions, prepends to CHANGELOG.md,
# commits back, and pushes a git tag.
#
# Commit message convention (prefix controls bump):
#   feat:        → minor  (1.x.0)
#   fix:         → patch  (1.0.x)
#   docs: / ci:  → patch  (1.0.x)
#   BREAKING CHANGE in body, or feat!: / fix!: → major (x.0.0)
#   chore: / style: / refactor: → patch
#
# Manual trigger: workflow_dispatch lets you override the bump type.

on:
  push:
    branches: [main]
    # [skip ci] in commit message prevents the release commit from re-triggering this
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options: [major, minor, patch]

permissions:
  contents: write    # needed to push the version-bump commit and tag

jobs:
  release:
    name: Bump version & update changelog
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.3.1
        with:
          fetch-depth: 0        # full history so we can read all commits
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Skip if commit is already a release bump
        id: guard
        run: |
          MSG=$(git log -1 --pretty=%s)
          if echo "$MSG" | grep -qE "^chore\(release\):"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine version bump
        if: steps.guard.outputs.skip == 'false'
        id: bump
        run: |
          # Manual override wins
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ inputs.bump }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Get commits since last tag (or all commits if no tag yet)
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=%s)
          else
            COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=%s)
          fi

          TYPE="patch"
          while IFS= read -r line; do
            # Breaking change markers
            if echo "$line" | grep -qE "^(feat|fix|refactor)!:|BREAKING CHANGE"; then
              TYPE="major"; break
            fi
            # Feature → minor (unless we already found major)
            if echo "$line" | grep -qE "^feat(\([^)]+\))?:"; then
              [ "$TYPE" = "major" ] || TYPE="minor"
            fi
          done <<< "$COMMITS"

          echo "type=$TYPE" >> "$GITHUB_OUTPUT"
          echo "Determined bump: $TYPE"

      - name: Bump version and update files
        if: steps.guard.outputs.skip == 'false'
        id: version
        run: |
          python3 scripts/sync_version.py bump "${{ steps.bump.outputs.type }}"
          NEW_VER=$(cat VERSION)
          echo "new=$NEW_VER" >> "$GITHUB_OUTPUT"
          echo "New version: $NEW_VER"

      - name: Generate changelog entry
        if: steps.guard.outputs.skip == 'false'
        run: |
          python3 scripts/update_changelog.py \
            "${{ steps.version.outputs.new }}" \
            "$(git describe --tags --abbrev=0 2>/dev/null || echo '')"

      - name: Update architecture doc deployment URLs
        if: steps.guard.outputs.skip == 'false'
        run: python3 scripts/update_arch_doc.py "${{ steps.version.outputs.new }}"

      - uses: actions/setup-node@v4.4.0
        if: steps.guard.outputs.skip == 'false'
        with:
          node-version: 20

      - name: Regenerate lockfile after version bump
        if: steps.guard.outputs.skip == 'false'
        run: npm install --ignore-scripts

      - name: Commit release artifacts
        if: steps.guard.outputs.skip == 'false'
        run: |
          git add VERSION CHANGELOG.md docs/architecture.md \
              package.json backend/package.json apps/web/package.json \
              apps/mobile/package.json packages/shared/package.json \
              packages/weighbridge-agent/package.json \
              package-lock.json
          NEW="${{ steps.version.outputs.new }}"
          BUMP="${{ steps.bump.outputs.type }}"
          git commit -m "chore(release): v${NEW} [skip ci]" \
            -m "Auto-generated by release workflow. Bump type: ${BUMP}"

      - name: Tag and push
        if: steps.guard.outputs.skip == 'false'
        run: |
          git tag -a "v${{ steps.version.outputs.new }}" \
            -m "Release v${{ steps.version.outputs.new }}"
          # Use GH_PAT if available (bypasses branch protection for the release bot)
          # If not set, falls back to GITHUB_TOKEN — add GH_PAT secret to enable auto-push
          if [ -n "${{ secrets.GH_PAT }}" ]; then
            git push origin main --follow-tags
          else
            git push origin --tags
            echo "⚠️  GH_PAT not set — version tag pushed but commit skipped (branch protection blocks GITHUB_TOKEN)."
            echo "   Add a GH_PAT secret (repo-scoped PAT) to enable full auto-release."
          fi
