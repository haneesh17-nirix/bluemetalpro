name: PR Checks

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # TypeScript checks — one job per package so failures are isolated
  # ─────────────────────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript — ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false   # run all packages even if one fails
      matrix:
        include:
          - package: shared
            dir: packages/shared
          - package: backend
            dir: backend
          - package: web
            dir: apps/web
          - package: mobile
            dir: apps/mobile
          - package: weighbridge-agent
            dir: packages/weighbridge-agent

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ${{ matrix.dir }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.dir }}
        run: npm install --ignore-scripts

      - name: Type-check
        working-directory: ${{ matrix.dir }}
        run: ./node_modules/.bin/tsc --noEmit

  # ─────────────────────────────────────────────────────────────────────────
  # SQL migration syntax check
  # ─────────────────────────────────────────────────────────────────────────
  sql-check:
    name: SQL migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check SQL with Python (always available)
        run: |
          python3 - <<'EOF'
          import sys, re, glob, os

          files = sorted(glob.glob("database/migrations/*.sql"))
          if not files:
              print("No SQL migration files found — check path")
              sys.exit(1)

          failed = []
          for path in files:
              with open(path) as f:
                  content = f.read()

              errors = []

              # Must contain at least one DDL/DML statement
              if not re.search(r'\b(CREATE|ALTER|INSERT|UPDATE|DROP|SELECT)\b', content, re.I):
                  errors.append("No SQL statements found")

              # Balanced $$ dollar-quoting
              if content.count('$$') % 2 != 0:
                  errors.append(f"Unmatched $$ dollar-quoting ({content.count('$$')} occurrences)")

              # Every CREATE TABLE should have a closing );
              creates = re.findall(r'CREATE TABLE\b', content, re.I)
              closings = re.findall(r'^\);', content, re.MULTILINE)
              if len(creates) > len(closings):
                  errors.append(f"Possible unclosed CREATE TABLE ({len(creates)} creates, {len(closings)} closing parentheses)")

              if errors:
                  print(f"FAIL {path}:")
                  for e in errors:
                      print(f"  - {e}")
                  failed.append(path)
              else:
                  print(f"PASS {path}")

          if failed:
              sys.exit(1)
          print(f"\n{len(files)} migration(s) checked — all OK")
          EOF

  # ─────────────────────────────────────────────────────────────────────────
  # Required files presence check
  # ─────────────────────────────────────────────────────────────────────────
  files-check:
    name: Required files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify all required files exist
        run: |
          python3 - <<'EOF'
          import sys, os

          REQUIRED = [
              # Root docs
              "CHANGELOG.md",
              "VERSIONING.md",
              "README.md",
              ".editorconfig",
              ".gitignore",
              # Database
              "database/migrations/001_initial.sql",
              "database/migrations/002_weighbridge_cameras.sql",
              # Backend
              "backend/src/index.ts",
              "backend/src/routes/auth.ts",
              "backend/src/routes/sales.ts",
              "backend/src/routes/purchases.ts",
              "backend/src/routes/parties.ts",
              "backend/src/routes/products.ts",
              "backend/src/routes/vehicles.ts",
              "backend/src/routes/ledger.ts",
              "backend/src/routes/quarry.ts",
              "backend/src/routes/maintenance.ts",
              "backend/src/routes/wages.ts",
              "backend/src/routes/reports.ts",
              "backend/src/routes/invoices.ts",
              "backend/src/routes/users.ts",
              "backend/src/routes/weighbridge.ts",
              "backend/src/routes/cameras.ts",
              "backend/src/services/pdfGenerator.ts",
              "backend/src/services/notifications.ts",
              "backend/src/services/azureStorage.ts",
              # Shared package
              "packages/shared/src/index.ts",
              "packages/shared/src/types/weighbridge.ts",
              "packages/shared/src/types/camera.ts",
              "packages/shared/src/utils/parsers.ts",
              # Edge agent
              "packages/weighbridge-agent/src/index.ts",
              "packages/weighbridge-agent/.env.example",
              # Web pages
              "apps/web/src/app/login/page.tsx",
              "apps/web/src/app/dashboard/page.tsx",
              "apps/web/src/app/sales/page.tsx",
              "apps/web/src/app/reports/page.tsx",
              "apps/web/src/app/parties/page.tsx",
              "apps/web/src/app/maintenance/page.tsx",
              "apps/web/src/app/wages/page.tsx",
              "apps/web/src/app/users/page.tsx",
              "apps/web/src/app/weighbridge/page.tsx",
              "apps/web/src/app/cameras/page.tsx",
              # Mobile
              "apps/mobile/app.json",
              "apps/mobile/src/screens/LoginScreen.tsx",
              "apps/mobile/src/screens/DashboardScreen.tsx",
              "apps/mobile/src/screens/WeighbridgeScreen.tsx",
              "apps/mobile/src/components/CameraFeed.tsx",
              # Infra
              "infra/main.bicep",
              # CI workflows
              ".github/workflows/backend.yml",
              ".github/workflows/web.yml",
              ".github/workflows/mobile.yml",
              ".github/workflows/infra.yml",
              ".github/workflows/pr-checks.yml",
              # Docs
              "docs/architecture.md",
              "docs/hardware-setup.md",
          ]

          missing = [f for f in REQUIRED if not os.path.isfile(f)]
          if missing:
              print(f"Missing {len(missing)} required file(s):")
              for f in missing:
                  print(f"  ✗  {f}")
              sys.exit(1)
          else:
              print(f"All {len(REQUIRED)} required files present.")
          EOF

  # ─────────────────────────────────────────────────────────────────────────
  # JSON validity check
  # ─────────────────────────────────────────────────────────────────────────
  json-check:
    name: JSON validity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          python3 - <<'EOF'
          import sys, json, glob

          patterns = [
              "package.json",
              "apps/*/package.json",
              "apps/*/app.json",
              "backend/package.json",
              "packages/*/package.json",
              "infra/params.json",
          ]
          import glob as g
          files = []
          for p in patterns:
              files.extend(g.glob(p))

          failed = []
          for f in sorted(set(files)):
              try:
                  json.load(open(f))
                  print(f"PASS {f}")
              except json.JSONDecodeError as e:
                  print(f"FAIL {f}: {e}")
                  failed.append(f)

          if failed:
              sys.exit(1)
          print(f"\n{len(files)} JSON file(s) validated.")
          EOF

  # ─────────────────────────────────────────────────────────────────────────
  # Secrets scan — ensure nothing sensitive was accidentally committed
  # ─────────────────────────────────────────────────────────────────────────
  secrets-scan:
    name: Secrets scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for hardcoded secrets
        run: |
          FAIL=0

          # Azure connection strings
          if grep -rn --include="*.ts" --include="*.tsx" --include="*.js" \
               --exclude-dir=node_modules --exclude-dir=dist --exclude-dir=.next \
               "DefaultEndpointsProtocol=https;AccountName" .; then
            echo "ERROR: Azure connection string hardcoded in source"
            FAIL=1
          fi

          # Private keys / secrets longer than 20 chars assigned to a variable
          if grep -rn --include="*.ts" --include="*.tsx" --include="*.env" \
               --exclude-dir=node_modules --exclude-dir=dist \
               --exclude="*.example" \
               -E "(secret|password|apikey|api_key)\s*=\s*['\"][a-zA-Z0-9+/]{20,}" .; then
            echo "ERROR: Possible hardcoded secret found"
            FAIL=1
          fi

          # .env files (should never be committed)
          if find . -name ".env" -not -name ".env.example" \
               -not -path "*/node_modules/*" | grep -q .; then
            echo "ERROR: .env file found in repo (should be in .gitignore)"
            FAIL=1
          fi

          if [ $FAIL -eq 0 ]; then
            echo "No secrets detected."
          fi
          exit $FAIL

  # ─────────────────────────────────────────────────────────────────────────
  # Bicep syntax check (on infra changes only)
  # ─────────────────────────────────────────────────────────────────────────
  bicep-check:
    name: Bicep syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Azure CLI + Bicep
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
          az bicep install

      - name: Build Bicep (syntax check)
        run: az bicep build --file infra/main.bicep --stdout > /dev/null

  # ─────────────────────────────────────────────────────────────────────────
  # Cross-layer contract tests
  # Validates frontend ↔ backend ↔ database consistency statically.
  # ─────────────────────────────────────────────────────────────────────────
  contract-tests:
    name: Cross-layer contract tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run contract_test.py
        run: python3 scripts/contract_test.py

  # ─────────────────────────────────────────────────────────────────────────
  # Summary gate — required by branch protection rules
  # All jobs must pass for a PR to merge.
  # ─────────────────────────────────────────────────────────────────────────
  all-checks-pass:
    name: All checks passed
    runs-on: ubuntu-latest
    needs:
      - typecheck
      - sql-check
      - files-check
      - json-check
      - secrets-scan
      - bicep-check
      - contract-tests
    if: always()
    steps:
      - name: Gate
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more checks failed."
            exit 1
          fi
          echo "All checks passed."
