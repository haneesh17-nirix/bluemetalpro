name: PR Checks

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # TypeScript checks — one job per package, isolated failures
  # ─────────────────────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript — ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: shared
            workspace: packages/shared
          - package: backend
            workspace: backend
          - package: web
            workspace: apps/web
          - package: mobile
            workspace: apps/mobile
          - package: weighbridge-agent
            workspace: packages/weighbridge-agent

    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (${{ matrix.package }})
        run: npm ci --ignore-scripts --workspace=${{ matrix.workspace }} --workspace=packages/shared --include-workspace-root

      - name: Type-check
        working-directory: ${{ matrix.workspace }}
        run: npx tsc --noEmit

  # ─────────────────────────────────────────────────────────────────────────
  # Conventional commit lint — PRs only
  # ─────────────────────────────────────────────────────────────────────────
  commit-lint:
    name: Conventional commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Lint commit messages
        run: |
          python3 - <<'EOF'
          import subprocess, sys, re

          result = subprocess.run(
            ['git', 'log', 'origin/main..HEAD', '--pretty=format:%s'],
            capture_output=True, text=True
          )
          commits = [l.strip() for l in result.stdout.splitlines() if l.strip()]
          if not commits:
              print("No commits to check"); sys.exit(0)

          VALID = re.compile(r'^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([^)]+\))?(!)?:\s.+')
          SKIP  = re.compile(r'^(Merge |chore\(release\):)')

          failed = []
          for msg in commits:
              if SKIP.match(msg):   print(f"SKIP  {msg[:72]}")
              elif VALID.match(msg): print(f"PASS  {msg[:72]}")
              else:
                  print(f"FAIL  {msg[:72]}"); failed.append(msg)

          if failed:
              print(f"\n{len(failed)} commit(s) violate conventional commit format.")
              print("Format: feat|fix|docs|refactor|perf|test|ci|chore: description")
              sys.exit(1)
          print(f"\nAll {len(commits)} commit(s) valid.")
          EOF

      - name: Lint PR title
        run: |
          python3 - <<EOF
          import sys, re
          title = """${{ github.event.pull_request.title }}"""
          VALID = re.compile(r'^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([^)]+\))?(!)?:\s.+')
          if VALID.match(title.strip()):
              print(f"PASS  {title[:72]}")
          else:
              print(f"FAIL  PR title must follow conventional commit format.\n      Got: {title}")
              sys.exit(1)
          EOF

  # ─────────────────────────────────────────────────────────────────────────
  # SQL migration syntax
  # ─────────────────────────────────────────────────────────────────────────
  sql-check:
    name: SQL migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Validate SQL
        run: |
          python3 - <<'EOF'
          import sys, re, glob

          files = sorted(glob.glob("database/migrations/*.sql"))
          if not files:
              print("No SQL migration files found"); sys.exit(1)

          failed = []
          for path in files:
              content = open(path).read()
              errors = []
              if not re.search(r'\b(CREATE|ALTER|INSERT|UPDATE|DROP|SELECT)\b', content, re.I):
                  errors.append("No SQL statements found")
              if content.count('$$') % 2 != 0:
                  errors.append(f"Unmatched $$ ({content.count('$$')} occurrences)")
              creates  = len(re.findall(r'CREATE TABLE\b', content, re.I))
              closings = len(re.findall(r'^\);', content, re.MULTILINE))
              if creates > closings:
                  errors.append(f"Possible unclosed CREATE TABLE ({creates} creates, {closings} closings)")
              if errors:
                  print(f"FAIL {path}:"); [print(f"  - {e}") for e in errors]; failed.append(path)
              else:
                  print(f"PASS {path}")

          if failed: sys.exit(1)
          print(f"\n{len(files)} migration(s) OK")
          EOF

  # ─────────────────────────────────────────────────────────────────────────
  # Required files — auto-synced via scripts/sync_checks.py
  # ─────────────────────────────────────────────────────────────────────────
  files-check:
    name: Required files (auto-synced)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Verify required file list is up to date
        run: python3 scripts/sync_checks.py --verify
      - name: Check all required files exist
        run: |
          python3 - <<'EOF'
          import sys, os, re

          text = open("scripts/check.sh").read()
          m = re.search(r'REQUIRED=\((.*?)\)', text, re.DOTALL)
          if not m: print("Could not parse REQUIRED list"); sys.exit(1)

          required = re.findall(r'^\s+([^\s#][^\s]+)\s*$', m.group(1), re.MULTILINE)
          missing  = [f for f in required if not os.path.isfile(f)]

          if missing:
              print(f"Missing {len(missing)} required file(s):")
              [print(f"  ✗  {f}") for f in missing]
              sys.exit(1)
          print(f"All {len(required)} required files present.")
          EOF

  # ─────────────────────────────────────────────────────────────────────────
  # JSON validity
  # ─────────────────────────────────────────────────────────────────────────
  json-check:
    name: JSON validity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Validate JSON files
        run: |
          python3 - <<'EOF'
          import sys, json, glob

          files = []
          for p in ["package.json","apps/*/package.json","apps/*/app.json","backend/package.json","packages/*/package.json"]:
              files.extend(glob.glob(p))

          failed = []
          for f in sorted(set(files)):
              try:    json.load(open(f)); print(f"PASS {f}")
              except json.JSONDecodeError as e: print(f"FAIL {f}: {e}"); failed.append(f)

          if failed: sys.exit(1)
          print(f"\n{len(files)} JSON file(s) valid.")
          EOF

  # ─────────────────────────────────────────────────────────────────────────
  # Secrets scan
  # ─────────────────────────────────────────────────────────────────────────
  secrets-scan:
    name: Secrets scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Scan for hardcoded secrets
        run: |
          FAIL=0
          if grep -rn --include="*.ts" --include="*.tsx" --include="*.js" \
               --exclude-dir=node_modules --exclude-dir=dist --exclude-dir=.next \
               "DefaultEndpointsProtocol=https;AccountName" .; then
            echo "ERROR: Azure connection string hardcoded"; FAIL=1
          fi
          if grep -rn --include="*.ts" --include="*.tsx" \
               --exclude-dir=node_modules --exclude-dir=dist --exclude="*.example" \
               -E "(secret|password|apikey|api_key)\s*=\s*['\"][a-zA-Z0-9+/]{20,}" .; then
            echo "ERROR: Possible hardcoded secret"; FAIL=1
          fi
          if find . -name ".env" -not -name ".env.example" -not -path "*/node_modules/*" | grep -q .; then
            echo "ERROR: .env file committed"; FAIL=1
          fi
          [ $FAIL -eq 0 ] && echo "No secrets detected."
          exit $FAIL

  # ─────────────────────────────────────────────────────────────────────────
  # Bicep syntax
  # ─────────────────────────────────────────────────────────────────────────
  bicep-check:
    name: Bicep syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Install Azure CLI + Bicep
        run: curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash && az bicep install
      - name: Build Bicep
        run: az bicep build --file infra/main.bicep --stdout > /dev/null

  # ─────────────────────────────────────────────────────────────────────────
  # Cross-layer contract tests (frontend ↔ backend ↔ DB)
  # ─────────────────────────────────────────────────────────────────────────
  contract-tests:
    name: Cross-layer contract tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Run contract_test.py
        run: python3 scripts/contract_test.py

  # ─────────────────────────────────────────────────────────────────────────
  # Auto-sync docs + version on merge to main
  # Runs sync_checks.py to update REQUIRED list, then commits if changed
  # ─────────────────────────────────────────────────────────────────────────
  sync-docs:
    name: Sync checks & docs
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Sync required file list
        run: python3 scripts/sync_checks.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit."
          else
            git add scripts/check.sh
            git commit -m "chore(checks): auto-sync required file list [skip ci]"
            git push
          fi

  # ─────────────────────────────────────────────────────────────────────────
  # Gate — all required checks must pass before merge
  # ─────────────────────────────────────────────────────────────────────────
  all-checks-pass:
    name: All checks passed
    runs-on: ubuntu-latest
    needs:
      - typecheck
      - sql-check
      - files-check
      - json-check
      - secrets-scan
      - bicep-check
      - contract-tests
      - commit-lint
    if: always()
    steps:
      - name: Gate
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more checks failed — merge blocked."
            exit 1
          fi
          echo "All checks passed."
